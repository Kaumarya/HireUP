<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <!-- Glow filter -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- Animated glow -->
    <filter id="animatedGlow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur">
        <animate attributeName="stdDeviation" 
          values="2;4;2" 
          dur="2s" 
          repeatCount="indefinite"/>
      </feGaussianBlur>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background rounded square with animated glow -->
  <rect width="32" height="32" rx="6" fill="#22C55E" filter="url(#animatedGlow)"/>
  
  <!-- Zap/Lightning icon in black -->
  <g transform="translate(10, 8)" filter="url(#glow)">
    <path d="M6 0L0 10h5l-1 6 6-8h-5l1-6z" fill="black" stroke="none"/>
  </g>
</svg>
